<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Genseiryu Karatedo Registration Form</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 48px; color: #222; line-height: 1.5; }
      h1 { color: #9f1f18; }
      .field { border-bottom: 1px solid #777; min-height: 28px; margin: 10px 0 18px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      small { color: #666; }
    </style>
  </head>
  <body>
    <h1>Genseiryu Karatedo Registration Form</h1>
    <p><strong>Demo document.</strong> Replace this with the teacher's real Google Drive file before launch.</p>
    <div class="grid">
      <section>
        <label>Student full name</label>
        <div class="field"></div>
      </section>
      <section>
        <label>Date of birth</label>
        <div class="field"></div>
      </section>
      <section>
        <label>Parent/guardian name</label>
        <div class="field"></div>
      </section>
      <section>
        <label>Phone number</label>
        <div class="field"></div>
      </section>
    </div>
    <label>Email</label>
    <div class="field"></div>
    <label>Previous martial arts experience</label>
    <div class="field"></div>
    <p><small>Please bring this form to the first class or send it to the instructor.</small></p>
  </body>
</html>
